<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AsoFighters</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h1>AsoFighters</h1>

    <!-- Login screen -->
    <div id="login" class="login">
      <h2>ログイン / 新規登録</h2>
      <input id="name" maxlength="12" placeholder="名前（12文字まで）" autocomplete="off" />
      <input id="password" type="password" placeholder="パスワード" autocomplete="off" />
      <button id="loginBtn">ログインしてマッチング</button>
      <p id="loginMsg" class="loginmsg"></p>
      <p class="loginhint">
        ※ パスワードがアカウントの鍵です。初回は名前＋パスワードで登録（AP100スタート）、
        次回からは同じパスワードでログインします。
      </p>
    </div>

    <!-- Profile screen -->
    <div id="profile" class="profile hidden">
      <div class="pcard">
        <div class="pcard-top">
          <span id="p-name" class="p-name"></span>
          <span id="p-rank" class="p-rank"></span>
        </div>
        <div id="p-ap" class="p-ap"></div>
        <div id="p-stats" class="p-stats"></div>
        <div id="p-streak" class="p-streak"></div>
        <button id="battleBtn" class="battlebtn">バトル開始</button>
      </div>
      <div class="ranking">
        <h3>ランキング <span class="rank-sub">TOP 10</span></h3>
        <ol id="rank-list" class="rank-list"></ol>
      </div>
    </div>

    <!-- Game -->
    <div id="stage" class="hidden">
      <canvas id="game" width="800" height="400"></canvas>
      <div id="overlay" class="overlay hidden">
        <div id="overlay-text"></div>
        <div id="overlay-sub"></div>
        <button id="overlay-btn" class="overlay-btn hidden">プロフィールに戻る</button>
      </div>
    </div>

    <div id="help" class="help hidden">
      <strong>操作</strong>：
      移動 <kbd>A</kbd>/<kbd>D</kbd>・<kbd>←</kbd>/<kbd>→</kbd>
      ジャンプ <kbd>W</kbd>/<kbd>↑</kbd>/<kbd>Space</kbd>
      パンチ <kbd>J</kbd>
      キック <kbd>K</kbd>
      ガード <kbd>L</kbd>/<kbd>S</kbd>（長押し）
      必殺技 <kbd>U</kbd>（ゲージ満タンで）
      <br>
      <span class="hint">2本先取（ベスト3）。勝つと +15 AP、負けると −10 AP。</span>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
